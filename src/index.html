<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>LotoIA - Tu Plataforma de Lotería Online</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="LotoIA - Plataforma de lotería online con inteligencia artificial">
  <meta name="theme-color" content="#4CAF50">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Preconectar con dominios importantes -->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <!-- Bootstrap CSS (última versión) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Correcciones para Bootstrap en Angular Universal -->
  <link rel="stylesheet" href="assets/css/bootstrap-fixes.css">
  <!-- Correcciones específicas para dispositivos móviles -->
  <link rel="stylesheet" href="assets/css/mobile-fixes.css">
  <!-- Solución para el problema de división vertical -->
  <link rel="stylesheet" href="assets/css/vertical-split-fix.css">
  <style>
    /* Estilos base para todos los dispositivos */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      box-sizing: border-box;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

    *, *:before, *:after {
      box-sizing: inherit;
    }

    /* Estilos específicos para móviles */
    @media (max-width: 768px) {
      body {
        font-size: 16px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        width: 100% !important;
        max-width: 100% !important;
        overflow-x: hidden !important;
      }

      /* Asegurarse de que los elementos no se salgan de la pantalla */
      img, video, canvas, svg, iframe {
        max-width: 100% !important;
        height: auto !important;
      }

      /* Mejorar la interacción táctil */
      button, a, input, select, textarea {
        min-height: 44px;
        min-width: 44px;
      }

      /* Prevenir desbordamiento horizontal */
      .container, .container-fluid, .row, .col, [class*="col-"] {
        width: 100% !important;
        max-width: 100% !important;
        padding-left: 10px !important;
        padding-right: 10px !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
        float: none !important;
      }

      /* Ajustes específicos para el encabezado */
      header, .header, .cabecera-superior, .cabecera-inferior {
        width: 100% !important;
        max-width: 100% !important;
        overflow-x: hidden !important;
        left: 0 !important;
        right: 0 !important;
      }

      /* Solución específica para el problema de división vertical */
      body * {
        max-width: 100vw !important;
      }

      /* Forzar que no haya elementos con ancho fijo que causen división */
      [style*="width:"], [style*="width: "] {
        width: 100% !important;
        max-width: 100% !important;
      }
    }

    /* Estilos específicos para dispositivos muy pequeños */
    @media (max-width: 360px) {
      body {
        font-size: 14px;
      }

      /* Reducir padding para aprovechar espacio */
      .container, .container-fluid, .row, .col, [class*="col-"] {
        padding-left: 5px !important;
        padding-right: 5px !important;
      }
    }
  </style>
</head>
<body>
  <app-root></app-root>
  <!-- Bootstrap JS Bundle with Popper (última versión) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script para forzar la aplicación de estilos en dispositivos móviles y diagnóstico integrado -->
  <script>
    (function() {
      // Función para aplicar estilos móviles
      function applyMobileStyles() {
        if (window.innerWidth <= 768) {
          console.log("Aplicando estilos móviles...");

          // Forzar ancho completo en elementos clave
          document.documentElement.style.width = '100%';
          document.documentElement.style.maxWidth = '100%';
          document.documentElement.style.overflowX = 'hidden';
          document.body.style.width = '100%';
          document.body.style.maxWidth = '100%';
          document.body.style.overflowX = 'hidden';

          // Aplicar estilos a elementos específicos
          var elements = document.querySelectorAll('header, .header, main, .main, footer, .footer, .container, .container-fluid, .row, .col, [class*="col-"], .modulo-cabecera, .cabecera-superior, .cabecera-inferior, .juegos-container');
          for (var i = 0; i < elements.length; i++) {
            elements[i].style.width = '100%';
            elements[i].style.maxWidth = '100%';
            elements[i].style.boxSizing = 'border-box';
            elements[i].style.overflowX = 'hidden';
          }

          // Solución radical: forzar ancho en todos los elementos
          var allElements = document.querySelectorAll('*');
          for (var i = 0; i < allElements.length; i++) {
            var el = allElements[i];
            var style = window.getComputedStyle(el);
            var offsetWidth = el.offsetWidth;

            // Si el elemento es más ancho que la ventana, forzar ancho
            if (offsetWidth > window.innerWidth + 5) {
              console.log("Elemento problemático encontrado:", el.tagName, el.className);
              el.style.width = '100%';
              el.style.maxWidth = '100%';
              el.style.overflowX = 'hidden';
            }
          }

          // Crear botón de diagnóstico inline
          createDiagnosticButton();
        }
      }

      // Función para crear botón de diagnóstico
      function createDiagnosticButton() {
        // Verificar si el botón ya existe
        if (document.getElementById('mobile-diagnostic-button')) {
          return;
        }

        // Crear el botón
        var debugButton = document.createElement('button');
        debugButton.id = 'mobile-diagnostic-button';
        debugButton.textContent = 'Diagnosticar';
        debugButton.style.position = 'fixed';
        debugButton.style.bottom = '10px';
        debugButton.style.right = '10px';
        debugButton.style.zIndex = '9999';
        debugButton.style.padding = '10px';
        debugButton.style.backgroundColor = '#ff5722';
        debugButton.style.color = 'white';
        debugButton.style.border = 'none';
        debugButton.style.borderRadius = '5px';
        debugButton.style.fontSize = '12px';

        // Crear el panel de información
        var infoPanel = document.createElement('div');
        infoPanel.id = 'mobile-diagnostic-panel';
        infoPanel.style.position = 'fixed';
        infoPanel.style.top = '0';
        infoPanel.style.left = '0';
        infoPanel.style.width = '100%';
        infoPanel.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
        infoPanel.style.color = 'white';
        infoPanel.style.padding = '10px';
        infoPanel.style.fontFamily = 'monospace';
        infoPanel.style.fontSize = '12px';
        infoPanel.style.zIndex = '10000';
        infoPanel.style.maxHeight = '80%';
        infoPanel.style.overflowY = 'auto';
        infoPanel.style.display = 'none';

        // Añadir elementos al DOM
        document.body.appendChild(debugButton);
        document.body.appendChild(infoPanel);

        // Evento para mostrar/ocultar el panel
        debugButton.addEventListener('click', function() {
          if (infoPanel.style.display === 'none') {
            showDiagnosticInfo(infoPanel);
          } else {
            infoPanel.style.display = 'none';
          }
        });
      }

      // Función para mostrar información de diagnóstico
      function showDiagnosticInfo(panel) {
        // Información básica del viewport
        var info = "Ancho de ventana: " + window.innerWidth + "px\n" +
                   "Ancho de documento: " + document.documentElement.scrollWidth + "px\n" +
                   "Ancho de body: " + document.body.scrollWidth + "px\n" +
                   "Ancho de viewport: " + (window.visualViewport ? window.visualViewport.width : 'No disponible') + "px\n" +
                   "Escala de viewport: " + (window.visualViewport ? window.visualViewport.scale : 'No disponible') + "\n";

        // Buscar elementos problemáticos
        var elements = document.querySelectorAll('*');
        var problematicElements = [];

        for (var i = 0; i < elements.length; i++) {
          var el = elements[i];
          var style = window.getComputedStyle(el);
          var offsetWidth = el.offsetWidth;

          if (offsetWidth > window.innerWidth + 5) {
            problematicElements.push({
              element: el.tagName + (el.id ? '#' + el.id : '') + (el.className ? '.' + el.className.replace(/\s+/g, '.') : ''),
              computedWidth: style.width,
              offsetWidth: offsetWidth + 'px',
              overflowX: style.overflowX,
              position: style.position
            });
          }
        }

        if (problematicElements.length > 0) {
          info += '\n\nElementos problemáticos encontrados:\n\n';
          for (var i = 0; i < problematicElements.length; i++) {
            var e = problematicElements[i];
            info += e.element + "\nAncho: " + e.computedWidth + " / " + e.offsetWidth + "\nOverflow-X: " + e.overflowX + "\nPosition: " + e.position + "\n\n";
          }
        } else {
          info += '\n\nNo se encontraron elementos problemáticos.';
        }

        // Mostrar información
        panel.textContent = info;
        panel.style.display = 'block';

        // Aplicar corrección automática
        document.documentElement.style.width = '100%';
        document.documentElement.style.maxWidth = '100%';
        document.documentElement.style.overflowX = 'hidden';
        document.body.style.width = '100%';
        document.body.style.maxWidth = '100%';
        document.body.style.overflowX = 'hidden';
      }

      // Aplicar al cargar la página
      window.addEventListener('DOMContentLoaded', applyMobileStyles);

      // Aplicar al cambiar el tamaño de la ventana
      window.addEventListener('resize', applyMobileStyles);

      // Aplicar después de un breve retraso para asegurar que todos los elementos estén cargados
      setTimeout(applyMobileStyles, 500);
      setTimeout(applyMobileStyles, 1000);
      setTimeout(applyMobileStyles, 2000);
      setTimeout(applyMobileStyles, 5000);

      // Asegurarse de que el botón de diagnóstico se cree incluso si hay retrasos en la carga
      setTimeout(function() {
        if (window.innerWidth <= 768 && !document.getElementById('mobile-diagnostic-button')) {
          createDiagnosticButton();
        }
      }, 10000);
    })();
  </script>
</body>
</html>

name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecutar manualmente desde la interfaz de GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Obtener todo el historial para que git describe funcione correctamente

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build:ssr

    # Usar una única acción para el despliegue completo
    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: 212.227.230.103
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Pulling latest changes from GitHub..."
          cd /var/www/tienda-web-lotoAI-1
          git pull origin main

          echo "Limpiando caché y archivos antiguos..."
          rm -rf dist node_modules/.cache

          echo "Instalando dependencias..."
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npm ci

          echo "Compilando la aplicación en el servidor..."
          npm run build:ssr

          echo "Verificando archivos de componentes de cookies..."
          find dist -name "*cookie*" -type f

          echo "Verificando el contenido del archivo principal..."
          grep -r "cookie-banner" dist/

          echo "Deteniendo servicios actuales..."
          export PATH=$PATH:/usr/local/bin:/usr/bin:/root/.nvm/versions/node/v18.19.0/bin
          which pm2
          pm2 stop all || echo "Error: pm2 stop failed"

          echo "Reiniciando servicios con la nueva compilación..."
          pm2 start npm --name "loto-ia" -- run serve:ssr:loto-ia || echo "Error: pm2 start failed"

          echo "Verificando estado de los servicios..."
          pm2 list

          echo "Deployment completed successfully!"

    - name: Deployment success notification
      if: success()
      run: |
        echo "::notice::Deployment completed successfully! The application has been deployed to the VPS."

    - name: Deployment failure notification
      if: failure()
      run: |
        echo "::error::Deployment failed! Please check the logs for more information."

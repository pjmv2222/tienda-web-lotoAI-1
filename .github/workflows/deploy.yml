name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecutar manualmente desde la interfaz de GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Obtener todo el historial para que git describe funcione correctamente

    - name: Debug secrets
      run: |
        echo "Checking if HOST secret exists..."
        if [ -n "${{ secrets.HOST }}" ]; then
          echo "HOST secret exists"
          echo "HOST length: ${#HOST}"
        else
          echo "HOST secret is empty or not set"
        fi

        echo "Checking if USERNAME secret exists..."
        if [ -n "${{ secrets.USERNAME }}" ]; then
          echo "USERNAME secret exists"
        else
          echo "USERNAME secret is empty or not set"
        fi

        echo "Checking if SERVER_PATH secret exists..."
        if [ -n "${{ secrets.SERVER_PATH }}" ]; then
          echo "SERVER_PATH secret exists"
        else
          echo "SERVER_PATH secret is empty or not set"
        fi

        echo "Checking if SSH_PRIVATE_KEY secret exists..."
        if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
          echo "SSH_PRIVATE_KEY secret exists"
        else
          echo "SSH_PRIVATE_KEY secret is empty or not set"
        fi
      env:
        HOST: ${{ secrets.HOST }}

    - name: Test ssh-keyscan
      run: |
        echo "Testing ssh-keyscan command..."
        which ssh-keyscan
        ssh-keyscan -h || echo "ssh-keyscan help command failed"
        echo "Trying with explicit IP..."
        ssh-keyscan -H 212.227.230.103 || echo "ssh-keyscan with hardcoded IP failed"

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build:ssr

    # Usando una acción alternativa para la configuración SSH
    - name: Setup SSH
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: 'just-a-placeholder'
        if_key_exists: replace

    - name: Configure known_hosts
      run: |
        # Usar un valor hardcoded para depuración
        echo "Configurando known_hosts con valor hardcoded..."
        ssh-keyscan -H 212.227.230.103 >> ~/.ssh/known_hosts

    # Eliminado el paso redundante de "Add host key to known_hosts"

    - name: Deploy to VPS
      run: |
        echo "Deploying to VPS..."
        # Usar valores hardcoded para depuración
        ssh -v root@212.227.230.103 "cd /var/www/tienda-web-lotoAI-1 && git pull origin main && pm2 restart all" || echo "SSH command failed"

    - name: Verify deployment
      run: |
        echo "Verifying deployment..."
        # Usar valores hardcoded para depuración
        ssh root@212.227.230.103 "pm2 status" || echo "Verification failed"

    - name: Deployment notification
      run: echo "Deployment completed successfully!"

name: Scraper Loterías

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        
    - name: Install dependencies
      run: |
        npm init -y
        npm install axios
        npm install -D typescript@4.9.5 ts-node@10.9.1 @types/node
        
    - name: Create tsconfig.json
      run: |
        echo '{
          "compilerOptions": {
            "target": "es2018",
            "module": "commonjs",
            "outDir": "./dist",
            "rootDir": "./src",
            "strict": true,
            "esModuleInterop": true,
            "skipLibCheck": true,
            "forceConsistentCasingInFileNames": true,
            "allowJs": true
          },
          "include": ["src/**/*"],
          "exclude": ["node_modules"]
        }' > tsconfig.json
        
    - name: Compile TypeScript
      run: |
        ./node_modules/.bin/tsc
        
    - name: Run scraper
      run: |
        node dist/scripts/scraper.js
      
    - name: Commit and push if changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add src/assets/botes.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar botes [skip ci]"
        git push

name: Scraper Loterías

on:
  schedule:
    - cron: '0 6,18 * * *'  # Ejecutar dos veces al día: 6 AM y 6 PM UTC
  workflow_dispatch:        # Permite ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        
    - name: Install dependencies
      run: |
        npm install axios cheerio
        npm install -D typescript@4.9.5 ts-node@10.9.1 @types/node
        
    - name: Create package.json if not exists
      run: |
        if [ ! -f package.json ]; then
          echo '{
            "name": "scraper-loterias",
            "version": "1.0.0",
            "type": "commonjs",
            "scripts": {
              "build": "tsc",
              "start": "ts-node src/scripts/scraper.ts"
            }
          }' > package.json
        fi
        
    - name: Create tsconfig.json
      run: |
        echo '{
          "compilerOptions": {
            "target": "es2018",
            "module": "commonjs",
            "outDir": "./dist",
            "rootDir": "./src",
            "strict": true,
            "esModuleInterop": true,
            "skipLibCheck": true,
            "forceConsistentCasingInFileNames": true
          },
          "include": ["src/**/*"],
          "exclude": ["node_modules"]
        }' > tsconfig.json
        
    - name: Compile and Run
      run: |
        npm run build
        node dist/scripts/scraper.js
      
    - name: Commit and push if changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add src/assets/botes.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar botes [skip ci]"
        git push

name: Scraper Loterías

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        
    - name: Install dependencies
      run: |
        npm install axios
        npm install -D typescript@4.9.5 ts-node@10.9.1 @types/node
        
    - name: Create scraper tsconfig
      run: |
        echo '{
          "compilerOptions": {
            "target": "es2018",
            "module": "commonjs",
            "outDir": "./dist-scraper",
            "rootDir": "./src/scripts",
            "strict": true,
            "esModuleInterop": true,
            "skipLibCheck": true,
            "forceConsistentCasingInFileNames": true,
            "experimentalDecorators": true
          },
          "include": ["src/scripts/**/*"],
          "exclude": ["src/app/**/*", "node_modules"]
        }' > scraper-tsconfig.json
        
    - name: Compile and Run Scraper
      run: |
        npx tsc -p scraper-tsconfig.json
        node dist-scraper/scraper.js
      
    - name: Commit and push if changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add src/assets/botes.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar botes [skip ci]"
        git push

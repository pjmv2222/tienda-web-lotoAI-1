name: Scraper Loterías

on:
  schedule:
    - cron: '0 6,18 * * *'  # Ejecutar dos veces al día: 6 AM y 6 PM UTC
  workflow_dispatch:        # Permite ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install axios cheerio
        npm install -D typescript ts-node @types/node
        
    - name: Create tsconfig.json
      run: |
        echo '{
          "compilerOptions": {
            "target": "es2018",
            "module": "commonjs",
            "strict": true,
            "esModuleInterop": true,
            "skipLibCheck": true,
            "forceConsistentCasingInFileNames": true
          }
        }' > tsconfig.json
        
    - name: Run scraper
      run: |
        npx ts-node --project tsconfig.json src/scripts/scraper.ts
      
    - name: Commit and push if changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add src/assets/botes.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar botes [skip ci]"
        git push

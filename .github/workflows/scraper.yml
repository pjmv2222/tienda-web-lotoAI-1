name: Scraper Loterías

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        
    - name: Create scraper package.json
      run: |
        cd scraper
        echo '{
          "name": "scraper-loterias",
          "version": "1.0.0",
          "type": "commonjs",
          "dependencies": {
            "axios": "^1.6.7"
          },
          "devDependencies": {
            "typescript": "^4.9.5",
            "ts-node": "^10.9.1",
            "@types/node": "^20.11.0"
          }
        }' > package.json
        
    - name: Create scraper tsconfig
      run: |
        cd scraper
        echo '{
          "compilerOptions": {
            "target": "es2018",
            "module": "commonjs",
            "outDir": "./dist",
            "rootDir": ".",
            "strict": true,
            "esModuleInterop": true,
            "skipLibCheck": true,
            "forceConsistentCasingInFileNames": true
          },
          "include": ["./**/*"],
          "exclude": ["node_modules", "dist"]
        }' > tsconfig.json
        
    - name: Install scraper dependencies
      run: |
        cd scraper
        npm install
        
    - name: Run scraper
      run: |
        cd scraper
        npx ts-node scraper.ts
      
    - name: Commit and push if changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add src/assets/botes.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar botes [skip ci]"
        git push
